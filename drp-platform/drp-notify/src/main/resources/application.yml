server:
  port: 8084

spring:
  application:
    name: drp-notify

  datasource:
    url: jdbc:mysql://localhost:3306/drp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  mail:
    host: smtp.example.com
    port: 465
    username: notify@example.com
    password: mail-password
    properties:
      mail:
        smtp:
          ssl:
            enable: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.drp.notify: INFO
